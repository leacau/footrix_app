<!doctype html>
<html>
	<head>
		<!-- Base href para routing en producción -->
		<base href="$FLUTTER_BASE_HREF" />

		<!-- Charset y compatibilidad -->
		<meta charset="UTF-8" />
		<meta content="IE=Edge" http-equiv="X-UA-Compatible" />

		<!-- PWA: Viewport responsivo -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>

		<!-- PWA: Tema y colores -->
		<meta name="theme-color" content="#0052CC" />
		<meta name="background-color" content="#ffffff" />

		<!-- PWA: Descripción y nombre -->
		<meta
			name="description"
			content="Predice partidos de fútbol, competí con amigos y escala en el ranking."
		/>
		<meta name="application-name" content="Footrix" />

		<!-- PWA: Habilitar instalación en móvil -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta
			name="apple-mobile-web-app-status-bar-style"
			content="black-translucent"
		/>
		<meta name="apple-mobile-web-app-title" content="Footrix" />

		<!-- PWA: Icons para iOS -->
		<link rel="apple-touch-icon" href="icons/Icon-192.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png" />
		<link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png" />

		<!-- Favicon -->
		<link rel="icon" type="image/png" href="favicon.png" />

		<title>Footrix</title>

		<!-- PWA: Manifest -->
		<link rel="manifest" href="manifest.json" />

		<!-- Google Sign-In (para auth) -->
		<script src="https://accounts.google.com/gsi/client" async defer></script>

		<!-- PWA: Service Worker registration (Flutter lo genera automático) -->
		<script>
			// ✅ Registrar solo el service worker de Flutter
			// FCM funcionará con el mismo SW (no necesita uno separado)
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', function () {
					navigator.serviceWorker
						.register('flutter_service_worker.js')
						.then(function (registration) {
							console.log(
								'✅ Flutter ServiceWorker registrado:',
								registration.scope,
							);
						})
						.catch(function (err) {
							console.log('❌ ServiceWorker falló:', err);
						});
				});
			}
		</script>
	</head>
	<body>
		<!-- Flutter bootstrap -->
		<script src="flutter_bootstrap.js" async></script>
	</body>
</html>

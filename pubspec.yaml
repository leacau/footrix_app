name: footrix
description:
  'Predice partidos de fútbol, competí con amigos y escala en el ranking.'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  cupertino_icons: ^1.0.8

  flutter_local_notifications: ^17.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  cloud_functions: ^5.6.2
  # State & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Utils
  shared_preferences: ^2.3.2
  uuid: ^4.4.0

  # PWA: Para detectar si está instalado
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  url_launcher_android: 6.3.17

flutter:
  uses-material-design: true
  generate: true
  # ✅ assets: section removida (no necesaria para PWA icons)
